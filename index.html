  else if(r===7){delta=-500000; text=`Ремонт бізнесу -500 000₴`;}
  else if(r===8){delta=750000; text=`Дохід від акцій +750 000₴`;}
  else if(r===9){text=`Пропуск податку! Наступний податок 0₴`;}
  else if(r===10){delta=150000; text=`Знайшли гаманець +150 000₴`;}
  else{delta=-200000; text=`Благодійний внесок -200 000₴`;}
  return {delta, jail, vip, text, taxSkip: r===9};
}
// основний цикл ходу з усіма фішками
async function processTurn(player, d1,d2){
  let cur = {...player};
  let newPos = (cur.pos + d1 + d2) % 40;
  let money = cur.money;
  let passStart = newPos < cur.pos;
  if(passStart){ money += 2000000; addLog(`🏁 <span class="en">${cur.name}</span> пройшов СТАРТ → <span class="em">+2 000 000₴</span>`); toast(`+2 000 000₴`);}
  const cell = getCell(newPos);
  addLog(`🎲 <span class="en">${cur.name}</span> кинув ${d1}+${d2}=${d1+d2} → <span class="ep">${cell.name}</span>`);
  // власність або події
  if(cell.type==='jail'){
    addLog(`⛓ <span class="en">${cur.name}</span> потрапив у в'язницю!`); toast(`⛓ В'язниця!`); money = Math.max(0,money-500000);
    return {jail:true, jailTurns:3, pos:newPos, money};
  }
  if(cell.type==='tax'){
    let tax = cell.amount;
    if(cur.vipCard && cur.vipUses>0){ tax = Math.floor(tax/2); cur.vipUses--; addLog(`💳 VIP карта зменшила податок до ${tax.toLocaleString()}₴`);}
    money = Math.max(0,money-tax);
    addLog(`💸 <span class="en">${cur.name}</span> податок <span class="ex">-${tax.toLocaleString()}₴</span>`); toast(`Податок -${tax.toLocaleString()}₴`);
  }
  if(cell.type==='chance'){
    const eff = chanceEffect(cur);
    money = Math.max(0, money + eff.delta);
    if(eff.delta!==0) addLog(`❓ ШАНС: ${eff.text} <span class="${eff.delta>0?'em':'ex'}">${eff.delta>0?'+':''}${eff.delta.toLocaleString()}₴</span>`);
    else addLog(`❓ ШАНС: ${eff.text}`);
    if(eff.jail){ return {jail:true, jailTurns:3, pos:newPos, money};}
    if(eff.vip){ cur.vipCard=true; cur.vipUses=2; addLog(`💳 <span class="ep">VIP-картка активована! 2 податки/оренди зі знижкою 50%</span>`);}
  }
  // перевірка оренди
  const owner = await getOwner(newPos);
  if(owner && owner.id!==cur.id && !cur.isBot){
    let rent = Math.floor(cell.price * 0.1);
    if(owner.houses && owner.houses[newPos]) rent += rent * 0.5 * owner.houses[newPos];
    if(cur.vipCard && cur.vipUses>0){ rent = Math.floor(rent/2); cur.vipUses--; addLog(`💳 VIP знижка на оренду!`);}
    money = Math.max(0, money-rent);
    addLog(`💰 <span class="en">${cur.name}</span> → <span class="en">${owner.name}</span> оренда <span class="ex">-${rent.toLocaleString()}₴</span>`);
    await db.ref(`rooms/${myRoom}/players/${owner.id}`).update({money: owner.money + rent});
  }
  // купівля
  if(cell.price && !owner && money >= cell.price && !cur.isBot){
    document.getElementById('propBuy').style.display='flex';
    document.getElementById('propBuy').innerHTML=`<div style="background:${cell.color||'#aaa'};width:10px;height:30px;border-radius:3px"></div><div style="flex:1"><div style="font-weight:800">${cell.emoji} ${cell.name}</div><div style="font-weight:900;color:var(--gold)">${cell.price.toLocaleString()}₴</div></div><button class="pb-btn" style="background:#22c55e;border:none;padding:8px 13px;border-radius:9px;color:white;font-weight:800" onclick="buyProp(${newPos},${cell.price})">Купити</button>`;
  } else { document.getElementById('propBuy').style.display='none';}
  return {jail:cur.jail, jailTurns:cur.jailTurns, pos:newPos, money, vipCard:cur.vipCard, vipUses:cur.vipUses};
}
async function getOwner(pos){ const snap=await db.ref(`rooms/${myRoom}/players`).once('value'); const pl=snap.val(); if(!pl)return null; for(let id in pl) if(pl[id].props && pl[id].props.includes(pos)) return pl[id]; return null;}
async function buyProp(pos,price){ const snap=await db.ref(`rooms/${myRoom}`).once('value'); const me=snap.val()?.players?.[myId]; if(!me || me.money<price){toast('Не вистачає грошей'); return;} await db.ref(`rooms/${myRoom}/players/${myId}`).update({props:[...(me.props||[]),pos], money:me.money-price}); addLog(`🏠 <span class="en">${me.name}</span> купив <span class="ep">${PROPS[pos].name}</span> <span class="ex">-${price.toLocaleString()}₴</span>`); toast(`Куплено!`); document.getElementById('propBuy').style.display='none';}
async function rollDice(){ if(!myRoom)return; const snap=await db.ref(`rooms/${myRoom}`).once('value'); const r=snap.val(); if(!r)return; const pl=Object.values(r.players); const cur=pl[r.game.current]; if(cur?.id!==myId){toast('Не ваш хід');return;} const d1=Math.ceil(Math.random()*6),d2=Math.ceil(Math.random()*6); const res=await processTurn(cur,d1,d2); await db.ref(`rooms/${myRoom}/players/${myId}`).update({pos:res.pos, money:res.money, jail:res.jail||false, jailTurns:res.jailTurns||0, vipCard:res.vipCard||cur.vipCard, vipUses:res.vipUses||0}); const next=(r.game.current+1)%pl.length; await db.ref(`rooms/${myRoom}/game`).update({dice1:d1,dice2:d2, current:next, lastRoll:Date.now()}); addLog(`🎲 <span class="en">${cur.name}</span> завершив хід`); }
function buildBoard(){ const boardDiv=document.getElementById('board'); boardDiv.innerHTML=''; const cen=document.createElement('div'); cen.className='bcen'; cen.style.gridColumn='2/11'; cen.style.gridRow='2/11'; cen.innerHTML='<div style="font-size:clamp(12px,4vw,22px)">🇺🇦</div><div style="font-size:clamp(4px,1.4vw,8px);font-weight:900">МОНОПОЛІЯ УКРАЇНА</div>'; boardDiv.appendChild(cen); const pm=[]; for(let i=0;i<=10;i++)pm.push({row:10,col:i,side:'b'}); for(let i=9;i>=1;i--)pm.push({row:i,col:10,side:'r'}); for(let i=10;i>=0;i--)pm.push({row:0,col:i,side:'t'}); for(let i=1;i<=9;i++)pm.push({row:i,col:0,side:'l'}); pm.forEach(({row,col,side},idx)=>{ if(idx>=40)return; const p=PROPS[idx]; const cell=document.createElement('div'); cell.className='cell'; cell.id='cell-'+idx; cell.style.gridRow=row+1; cell.style.gridColumn=col+1; if(p.type==='corner'){cell.classList.add('corner'); cell.innerHTML=`<div style="text-align:center"><div style="font-size:clamp(7px,2vw,14px)">${p.emoji}</div><div style="font-size:clamp(2.5px,.65vw,5px);font-weight:800">${p.short}</div></div>`;} else if(p.color){ cell.innerHTML=`<div style="height:22%;background:${p.color}"></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:78%"><div>${p.emoji}</div><div style="font-size:clamp(2.5px,.82vw,5.5px);font-weight:700">${p.short}</div><div style="font-size:clamp(2px,.62vw,4.5px)">${p.price?p.price.toLocaleString()+'₴':''}</div></div>`; } else cell.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%"><div>${p.emoji}</div><div>${p.short}</div></div>`; const tok=document.createElement('div'); tok.className='tokens'; tok.id='tok-'+idx; cell.appendChild(tok); boardDiv.appendChild(cell); }); }
function renderGame(r){ if(!gameShown){ buildBoard(); gameShown=true; addLog('🎮 Гра розпочата!'); } const pl=Object.values(r.players||{}); const me=pl.find(p=>p.id===myId); const cur=pl[r.game.current]; const isMy=cur?.id===myId; document.getElementById('gph').innerHTML=`<div class="gp-me"><div class="gp-av ${isMy?'ring':''}" style="border-color:${me.color}"><span>${me.name[0]}</span></div><div><div class="gp-nm">${me.name}</div><div class="gp-mn">${me.money.toLocaleString()}₴</div><div>${me.vipCard?'💳 VIP активна':' '}</div></div></div><div class="gp-others">${pl.filter(p=>p.id!==myId).map(p=>`<div class="gp-sm"><div class="gp-sm-av" style="border-color:${p.color}"><span>${p.name[0]}</span></div><div class="gp-sm-mn">${(p.money/1e6).toFixed(1)}M</div></div>`).join('')}</div>`; document.getElementById('rollBtn').disabled=!isMy; document.getElementById('rollBtn').className=isMy?'rbtn my':'rbtn wait'; document.getElementById('rollBtn').textContent=isMy?'🎲 Кинути кубики!':'⏳ Хід: '+cur?.name; if(r.game.dice1) document.getElementById('diceRow').innerHTML=`<div class="die"><svg viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="white"/><circle cx="${r.game.dice1===1?50:r.game.dice1===2?25:r.game.dice1===3?25:r.game.dice1===4?25:r.game.dice1===5?25:25}" cy="${r.game.dice1===1?50:r.game.dice1===2?25:r.game.dice1===3?25:r.game.dice1===4?25:r.game.dice1===5?25:25}" r="9" fill="#1e293b"/><circle cx="${r.game.dice1===2?75:r.game.dice1===3?75:r.game.dice1===4?75:r.game.dice1===5?75:75}" cy="${r.game.dice1===2?25:r.game.dice1===3?75:r.game.dice1===4?25:r.game.dice1===5?75:75}" r="9" fill="#1e293b"/></svg></div><span>+</span><div class="die"><svg viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="white"/><circle cx="${r.game.dice2===1?50:r.game.dice2===2?25:r.game.dice2===3?25:r.game.dice2===4?25:r.game.dice2===5?25:25}" cy="${r.game.dice2===1?50:r.game.dice2===2?25:r.game.dice2===3?25:r.game.dice2===4?25:r.game.dice2===5?25:25}" r="9"/><circle cx="${r.game.dice2===2?75:r.game.dice2===3?75:r.game.dice2===4?75:r.game.dice2===5?75:75}" cy="${r.game.dice2===2?25:r.game.dice2===3?75:r.game.dice2===4?25:r.game.dice2===5?75:75}" r="9"/></svg></div><span class="dsum">${r.game.dice1+r.game.dice2}</span>`; else document.getElementById('diceRow').innerHTML=`<span>🎲</span><span style="color:#334155">Очікуємо кидок</span>`; pl.forEach(p=>{ const tokDiv=document.getElementById('tok-'+p.pos); if(tokDiv){ const tok=document.createElement('div'); tok.className='tok'; tok.style.background=p.color; tok.innerHTML=`<span style="font-size:clamp(3px,.9vw,6px);font-weight:900;color:white">${p.isBot?'🤖':p.name[0]}</span>`; tokDiv.appendChild(tok); } }); }
async function listenRoom(){ db.ref(`rooms/${myRoom}`).on('value', snap=>{ const r=snap.val(); if(!r) return; if(r.status==='playing') renderGame(r); else if(r.status==='finished'){ clearInterval(timerInt); document.getElementById('wN').innerHTML=r.winner?`🏆 ${r.players[r.winner]?.name}`:'Гра завершена'; document.getElementById('wM').innerHTML=''; showScreen('s-win'); } }); }
function openCreate(){ document.getElementById('createModal').classList.add('on'); selMode='classic'; }
async function createRoom(){ myName=document.getElementById('pN')?.value||'Гравець'; myRoom='GAME-'+Math.random().toString(36).substr(2,4).toUpperCase(); const players={}; players[myId]=myData(0); await db.ref(`rooms/${myRoom}`).set({code:myRoom,mode:'classic',status:'waiting',hostId:myId,server:curServer,players,game:{current:0},createdAt:Date.now()}); closeCreate(); showScreen('s-lobby'); document.getElementById('lobbyCode').innerText=myRoom; listenRoom(); }
async function joinByCode(){ const code=document.getElementById('rC').value.trim().toUpperCase(); if(!code)return; myName=document.getElementById('pNj').value.trim()||'Гравець'; const snap=await db.ref(`rooms/${code}`).once('value'); if(!snap.val()){toast('Кімнату не знайдено');return;} myRoom=code; const pl=snap.val().players; const idx=Object.keys(pl||{}).filter(k=>!pl[k]?.isBot).length; await db.ref(`rooms/${myRoom}/players/${myId}`).set(myData(idx)); showScreen('s-lobby'); document.getElementById('lobbyCode').innerText=myRoom; listenRoom(); }
async function leaveRoom(){ if(myRoom){ await db.ref(`rooms/${myRoom}/players/${myId}`).remove(); const snap=await db.ref(`rooms/${myRoom}/players`).once('value'); if(!snap.val()||Object.keys(snap.val()).filter(k=>!k.startsWith('bot')).length===0) await db.ref(`rooms/${myRoom}`).remove(); } myRoom=null; gameShown=false; showScreen('s-main'); }
function startGame(){ db.ref(`rooms/${myRoom}`).update({status:'playing'}); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function closeCreate(){ document.getElementById('createModal').classList.remove('on'); }
function pTab(n,el){ document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on')); el.classList.add('on'); document.getElementById('pv-log').style.display=n==='log'?'flex':'none'; document.getElementById('pv-chat').style.display=n==='chat'?'flex':'none'; document.getElementById('pv-props').style.display=n==='props'?'flex':'none'; if(n==='props') loadPropsPanel(); }
async function loadPropsPanel(){ const snap=await db.ref(`rooms/${myRoom}/players/${myId}`).once('value'); const me=snap.val(); const propsDiv=document.getElementById('pv-props'); if(!me||!me.props) propsDiv.innerHTML='<div>Немає нерухомості</div>'; else propsDiv.innerHTML=me.props.map(pos=>{ const p=PROPS[pos]; return `<div style="background:rgba(255,255,255,.05);border-radius:12px;padding:8px;margin-bottom:6px"><div>${p.emoji} ${p.name}</div><div>🏠 ${me.houses?.[pos]||0}/4</div><button onclick="mortgageProp(${pos})" class="btn b-surf" style="padding:4px;font-size:10px">🏦 Закласти</button><button onclick="sellProp(${pos})" class="btn b-surf" style="padding:4px;font-size:10px">💸 Продати</button></div>`; }).join(''); }
async function mortgageProp(pos){ const snap=await db.ref(`rooms/${myRoom}/players/${myId}`).once('value'); const me=snap.val(); const val=PROPS[pos].price/2; await db.ref(`rooms/${myRoom}/players/${myId}`).update({money:me.money+val, mortgaged:[...(me.mortgaged||[]),pos], props:me.props.filter(p=>p!==pos)}); addLog(`🏦 <span class="en">${me.name}</span> заклав ${PROPS[pos].name} +${val.toLocaleString()}₴`); toast(`+${val.toLocaleString()}₴`); loadPropsPanel(); }
async function sellProp(pos){ const snap=await db.ref(`rooms/${myRoom}/players/${myId}`).once('value'); const me=snap.val(); const val=Math.floor(PROPS[pos].price/2); await db.ref(`rooms/${myRoom}/players/${myId}`).update({money:me.money+val, props:me.props.filter(p=>p!==pos)}); addLog(`💸 <span class="en">${me.name}</span> продав ${PROPS[pos].name} +${val.toLocaleString()}₴`); toast(`+${val.toLocaleString()}₴`); loadPropsPanel(); }
async function sendChat(){ const inp=document.getElementById('chatInput'); if(!inp.value.trim())return; const txt=inp.value; inp.value=''; const snap=await db.ref(`rooms/${myRoom}/players/${myId}`).once('value'); const me=snap.val(); await db.ref(`rooms/${myRoom}/chat`).push({uid:myId,name:me.name,text:txt,color:me.color,ts:Date.now()}); }
db.ref(`rooms/${myRoom}/chat`).on('value', snap=>{ if(!snap.val())return; const chatDiv=document.getElementById('chatLog'); chatDiv.innerHTML=Object.values(snap.val()).sort((a,b)=>a.ts-b.ts).map(m=>`<div class="cmsg"><div class="cav" style="background:${m.color}22;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center">${m.name[0]}</div><div class="cbub"><div style="font-size:9px;font-weight:700">${m.name}</div><div>${m.text}</div></div></div>`).join(''); });
function mTab(t,el){ document.querySelectorAll('.mtab').forEach(btn=>btn.classList.remove('on')); el.classList.add('on'); document.getElementById('tc-games').style.display=t==='games'?'block':'none'; document.getElementById('tc-active').style.display=t==='active'?'block':'none'; document.getElementById('tc-league').style.display=t==='league'?'block':'none'; document.getElementById('tc-join').style.display=t==='join'?'block':'none'; if(t==='games')loadRooms(); if(t==='active')loadMyRooms(); }
async function loadRooms(){ const snap=await db.ref('rooms').orderByChild('status').equalTo('waiting').once('value'); const rooms=snap.val(); const list=rooms?Object.keys(rooms).map(k=>rooms[k]):[]; document.getElementById('roomsList').innerHTML=list.slice(0,10).map(r=>`<div class="room-row" onclick="joinByCodeDirect('${r.code}')"><div class="slots">${[1,2,3,4].map(i=>`<div class="slot ${r.players?.[Object.keys(r.players)[i-1]]?'filled':''}"><span>${r.players?.[Object.keys(r.players)[i-1]]?.name?.[0]||'○'}</span></div>`).join('')}</div><div>›</div></div>`).join('')||'<div style="text-align:center">Немає відкритих ігор</div>'; }
async function loadMyRooms(){ const snap=await db.ref('rooms').once('value'); const rooms=snap.val(); const mine=rooms?Object.entries(rooms).filter(([k,r])=>r.hostId===myId||r.players?.[myId]):[]; document.getElementById('myRoomsList').innerHTML=mine.map(([k,r])=>`<div class="room-row" onclick="joinToExisting('${k}')"><div>${k}</div><div>${r.status}</div></div>`).join('')||'<div>Немає ваших ігор</div>'; }
async function joinToExisting(code){ myRoom=code; showScreen('s-lobby'); document.getElementById('lobbyCode').innerText=code; listenRoom(); }
async function joinByCodeDirect(code){ myName=document.getElementById('pNj')?.value||'Гравець'; myRoom=code; await db.ref(`rooms/${myRoom}/players/${myId}`).set(myData(0)); showScreen('s-lobby'); document.getElementById('lobbyCode').innerText=code; listenRoom(); }
function init(){ document.getElementById('profName').innerText=myName; document.getElementById('profAv').innerText=myName[0]; showScreen('s-main'); loadRooms(); }
init();
</script>
