<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Монополія Україна – Реалістичні ціни</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
/* ===== ВЕСЬ ВАШИЙ CSS (той, що був у довгому коді) ===== */
/* Він ідеальний, тому я його залишаю без змін. */
/* Для стислості тут не дублюю, але в фінальному коді він буде повністю. */
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body[data-theme="classic"]{--c1:#12082a;--c2:#1a0f35;--acc:#5b4fcf;--acc2:#7c6de0;--bb:#0d2010;--bb2:#1e5c2a;--bc:#091408}
body[data-theme="fruit"]{--c1:#0a1f0a;--c2:#0f2e0f;--acc:#16a34a;--acc2:#22c55e;--bb:#071a0e;--bb2:#2d6a3f;--bc:#040e07}
body[data-theme="city"]{--c1:#0a0f1e;--c2:#0d1a3a;--acc:#1d4ed8;--acc2:#3b82f6;--bb:#071018;--bb2:#1e3a5c;--bc:#04080f}
:root{--gold:#f5c842;--gold2:#e8a020;--green:#22c55e;--red:#ef4444;--surf:rgba(255,255,255,.07);--brd:rgba(255,255,255,.1);--txt:#f1f5f9;--sub:#94a3b8;--c1:#12082a;--c2:#1a0f35;--acc:#5b4fcf;--acc2:#7c6de0;--bb:#0d2010;--bb2:#1e5c2a;--bc:#091408}
body{font-family:'Nunito',sans-serif;background:var(--c1);color:var(--txt);min-height:100dvh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100dvh;position:relative;z-index:1}
.screen.active{display:flex}
#s-main{background:linear-gradient(160deg,var(--c1),var(--c2));overflow-y:auto;min-height:100dvh}
.main-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.3);gap:10px}
.prof-av{width:50px;height:50px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 12px rgba(245,200,66,.4);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;background:#2d1b69;color:var(--gold)}
.prof-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.prof-info{flex:1;min-width:0}
.prof-name{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:900;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-sub{font-size:10px;color:var(--sub);margin-top:2px}
.gold-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);border-radius:10px;padding:3px 8px;font-size:11px;font-weight:700;color:var(--gold);margin-top:3px}
.create-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a3a;border:none;border-radius:11px;padding:9px 13px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(245,200,66,.3);white-space:nowrap;flex-shrink:0}
.create-btn:active{transform:scale(.96)}
.settings-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:8px 10px;color:var(--sub);font-size:16px;cursor:pointer;flex-shrink:0}
.servers-strip{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--brd)}
.servers-strip::-webkit-scrollbar{display:none}
.srv-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1.5px solid rgba(255,255,255,.12);border-radius:20px;background:rgba(255,255,255,.05);color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.2s}
.srv-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.1)}
.main-tabs{display:flex;border-bottom:1px solid var(--brd);background:rgba(0,0,0,.2);padding:0 6px;overflow-x:auto;flex-shrink:0}
.main-tabs::-webkit-scrollbar{display:none}
.mtab{padding:10px 14px;border:none;background:transparent;color:var(--sub);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.mtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tc{flex:1;overflow-y:auto;padding-bottom:16px}
.rooms-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.rooms-lbl{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.ref-btn{background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:5px 10px;color:var(--acc2);font-size:13px;cursor:pointer}
.room-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s;gap:8px}
.room-row:active{background:rgba(255,255,255,.04)}
.slots{display:flex;gap:5px;flex:1;align-items:center}
.slot{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.slot.filled{border-color:rgba(255,255,255,.3)}
.slot img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.slot-ltr{font-size:15px;font-weight:800;color:rgba(255,255,255,.5)}
.slot.empty .slot-ltr{font-size:20px;color:rgba(255,255,255,.1)}
.row-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.arr{font-size:22px;font-weight:900;color:var(--gold)}
.lgstrip{display:flex;gap:6px;padding:8px 14px;overflow-x:auto}
.lgstrip::-webkit-scrollbar{display:none}
.lgico{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;cursor:pointer;border:2.5px solid transparent;transition:.2s;background:rgba(255,255,255,.05)}
.lg-hdr{background:linear-gradient(135deg,rgba(91,79,207,.2),rgba(91,79,207,.06));border:1px solid rgba(91,79,207,.2);border-radius:14px;padding:14px;margin:6px 14px 10px}
.lg-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:900;color:var(--gold)}
.lg-desc{font-size:11px;color:var(--sub);line-height:1.5;margin-top:5px}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-row.me{background:rgba(245,200,66,.07)}
.rnum{width:22px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:900;color:var(--sub);text-align:center;flex-shrink:0}
.rnum.g{color:#ffd700}.rnum.s{color:#c0c0c0}.rnum.b{color:#cd7f32}
.rav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2px solid;overflow:hidden;flex-shrink:0}
.rav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ri{flex:1;min-width:0}
.rname{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsub{font-size:10px;color:var(--sub);margin-top:1px}
.rscore{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.overlay.on{display:flex}
.sheet{background:var(--c2);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:18px 16px 32px;max-height:92vh;overflow-y:auto}
.sh-handle{width:40px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 auto 14px}
.sh-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:14px}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.mc{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:13px 10px;text-align:center;cursor:pointer;transition:.18s}
.mc:active{transform:scale(.95)}
.mc.on{border-color:var(--gold);background:rgba(245,200,66,.08)}
.me-ic{font-size:24px;margin-bottom:3px}
.mn{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700}
.md{font-size:10px;color:var(--sub);margin-top:2px}
label.lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:11px;color:var(--txt);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;outline:none;transition:border-color .2s;margin-bottom:9px}
input:focus,select:focus{border-color:var(--gold)}
select option{background:var(--c2)}
.btn{width:100%;padding:12px;border:none;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.18s;margin-bottom:7px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.b-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0a3a}
.b-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
.b-surf{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);color:var(--txt)}
.b-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.dv{display:flex;align-items:center;gap:10px;color:#475569;font-size:11px;margin:2px 0 8px}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.srow{display:flex;align-items:center;gap:12px;padding:13px;border-bottom:1px solid var(--brd)}
.sinfo{flex:1;min-width:0}
.sname{font-weight:700;font-size:14px}
.sdesc{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.4}
.toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,.15);position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.toggle.on{background:var(--green)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;transition:.3s}
.toggle.on::after{left:23px}
.theme-dots{display:flex;gap:10px;padding:13px}
.tdot{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.2s}
.tdot.on{border-color:white;box-shadow:0 0 8px rgba(255,255,255,.5)}
#s-lobby{background:var(--c1);padding:0}
.lhd{padding:12px 16px;background:linear-gradient(180deg,rgba(91,79,207,.12),transparent);border-bottom:1px solid var(--brd)}
.cb{background:rgba(245,200,66,.05);border:1px solid rgba(245,200,66,.18);border-radius:12px;padding:10px;text-align:center;margin-bottom:8px}
.cl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:1px}
.cv{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:var(--gold);letter-spacing:4px}
.mchip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(91,79,207,.12);border:1px solid rgba(91,79,207,.28);border-radius:16px;font-size:11px;font-weight:700;color:var(--acc2)}
.ll{flex:1;overflow-y:auto;padding:8px 14px}
.lf{padding:10px 14px;border-top:1px solid var(--brd)}
.pc{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:9px 11px;margin-bottom:6px}
.pc.at{border-color:var(--gold);background:rgba(245,200,66,.05)}
.aw{position:relative;flex-shrink:0}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;border:2.5px solid;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.avb{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--c1);display:flex;align-items:center;justify-content:center;font-size:8px}
.pi{flex:1;min-width:0}
.pn{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pd{font-size:10px;color:var(--sub);margin-top:1px}
.pm{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--green);white-space:nowrap}
.bdg{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700}
.by{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.22)}
.bh{background:rgba(245,200,66,.1);color:var(--gold);border:1px solid rgba(245,200,66,.22)}
.bb{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.22)}
.bred{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.22)}
.bbl{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.22)}
#s-game{background:#070d05;height:100dvh;overflow:hidden}
.gph{display:flex;align-items:center;background:linear-gradient(135deg,#0d1117,#111827);border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;padding:6px 10px;gap:10px}
.gp-me{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.gp-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;border:3px solid;overflow:hidden;flex-shrink:0;position:relative}
.gp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.gp-av.ring{box-shadow:0 0 0 2px var(--gold),0 0 12px rgba(245,200,66,.7);animation:rpulse 1.5s ease-in-out infinite}
@keyframes rpulse{0%,100%{box-shadow:0 0 0 2px var(--gold),0 0 10px rgba(245,200,66,.6)}50%{box-shadow:0 0 0 3px var(--gold),0 0 20px rgba(245,200,66,.9)}}
.gp-inf{flex:1;min-width:0}
.gp-nm{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gp-mn{font-family:'Unbounded',sans-serif;font-size:12px;color:var(--green);font-weight:700;margin-top:1px}
.gp-ps{font-size:10px;color:var(--sub);margin-top:1px}
.gp-others{display:flex;gap:8px;align-items:center;flex-shrink:0}
.gp-sm{display:flex;flex-direction:column;align-items:center;gap:2px}
.gp-sm-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2.5px solid;overflow:hidden;flex-shrink:0;position:relative}
.gp-sm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.gp-sm-av.ring{box-shadow:0 0 0 2px var(--gold),0 0 8px rgba(245,200,66,.7)}
.gp-sm-mn{font-size:9px;color:var(--green);font-weight:700;white-space:nowrap}
.timer-bar{height:3px;background:rgba(255,255,255,.08);flex-shrink:0}
.timer-fill{height:100%;background:var(--gold);transition:width 1s linear}
.timer-fill.urgent{background:var(--red);animation:tblink .5s infinite}
@keyframes tblink{0%,100%{opacity:1}50%{opacity:.3}}
.bw{padding:3px;flex-shrink:0}
.board{width:100%;height:min(97vw,40vh);display:grid;grid-template-columns:1.65fr repeat(9,1fr) 1.65fr;grid-template-rows:1.65fr repeat(9,1fr) 1.65fr;background:var(--bb);border:2px solid var(--bb2);border-radius:8px;overflow:hidden}
.cell{border:.5px solid rgba(45,106,63,.4);display:flex;flex-direction:column;background:var(--bc);overflow:hidden;position:relative;min-width:0;min-height:0}
.cbar{flex-shrink:0}
.cb-b{flex-direction:column}.cb-b .cbar{height:22%;width:100%}.cb-b .ci{flex:1;min-height:0}
.cb-t{flex-direction:column-reverse}.cb-t .cbar{height:22%;width:100%}.cb-t .ci{flex:1;min-height:0}
.cb-r{flex-direction:row}.cb-r .cbar{width:20%;height:100%}.cb-r .ci{flex:1;min-width:0}
.cb-l{flex-direction:row-reverse}.cb-l .cbar{width:20%;height:100%}.cb-l .ci{flex:1;min-width:0}
.ci{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px;overflow:hidden;position:relative}
.cimg{font-size:clamp(5px,2vw,13px);line-height:1;margin-bottom:.5px}
.cnm{font-size:clamp(2.5px,.82vw,5.5px);line-height:1.1;word-break:break-all;text-align:center;color:#86efac;font-weight:700}
.cpr{font-size:clamp(2px,.62vw,4.5px);color:#4ade80;line-height:1;margin-top:.5px;white-space:nowrap;font-weight:700}
.cell-houses{position:absolute;bottom:1px;left:0;right:0;display:flex;justify-content:center;gap:.5px;z-index:3;pointer-events:none}
.house-dot{width:clamp(3px,.9vw,5px);height:clamp(3px,.9vw,5px);border-radius:50%;flex-shrink:0}
.owner-strip{position:absolute;z-index:4;border-radius:1px}
.cell.nc{flex-direction:column;align-items:center;justify-content:center}
.cell.nc .ci{width:100%;height:100%}
.cell.corner{background:#030805;flex-direction:column;align-items:center;justify-content:center}
.cin{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;gap:1px;padding:2px}
.cem{font-size:clamp(7px,2vw,14px);line-height:1}
.clb{font-size:clamp(2.5px,.65vw,5px);color:#86efac;font-weight:800;line-height:1.1;text-align:center;word-break:break-word}
.bcen{grid-column:2/11;grid-row:2/11;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020804;z-index:1;gap:2px}
.bcf{font-size:clamp(12px,4vw,22px)}
.bct{font-family:'Unbounded',sans-serif;font-size:clamp(4px,1.4vw,8px);font-weight:900;color:var(--bb2);text-align:center;line-height:1.4}
.tokens{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:1px;z-index:10;pointer-events:none;padding:1px}

.tok{width:clamp(5px,1.9vw,10px);height:clamp(5px,1.9vw,10px);border-radius:50%;border:1.5px solid white;box-shadow:0 0 0 1px rgba(0,0,0,.9),0 1px 4px rgba(0,0,0,1);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.tok img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.tok-ltr{font-size:clamp(3px,.9vw,6px);font-weight:900;color:white;line-height:1}
.gp-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.panel-tabs{display:flex;background:#0d1117;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.ptab{flex:1;padding:7px;border:none;background:transparent;color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;border-top:2px solid transparent;transition:.2s;font-family:'Nunito',sans-serif}

.pview{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

.en{font-weight:800;color:#60a5fa}
.ep{font-weight:700;color:var(--gold)}
.em{font-weight:800;color:var(--green)}
.ex{font-weight:800;color:var(--red)}
.chat-log{flex:1;overflow-y:auto;padding:6px 10px;background:#080f1e}
.cmsg{display:flex;align-items:flex-start;gap:7px;margin-bottom:8px}

.cav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;overflow:hidden;border:1.5px solid}
.cav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.cbub{background:rgba(255,255,255,.07);border-radius:12px;padding:6px 10px;max-width:70%}
.cmsg.mine .cbub{background:rgba(91,79,207,.35)}
.cname{font-size:9px;font-weight:700;margin-bottom:2px;opacity:.7}
.ctext{font-size:12px;line-height:1.4}
