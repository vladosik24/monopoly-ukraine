<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Монополія Україна</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --accent: #3b82f6;
            --accent2: #22d3ee;
            --gold: #f59e0b;
            --red: #ef4444;
            --green: #22c55e;
            --surface: rgba(255,255,255,0.06);
            --surface2: rgba(255,255,255,0.1);
            --border: rgba(255,255,255,0.1);
            --border2: rgba(255,255,255,0.18);
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            font-family:'Nunito',sans-serif;
            background:#080f1e;
            color:#f1f5f9;
            min-height:100dvh;
            overflow-x:hidden;
        }

        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse 70% 50% at 15% 5%, rgba(59,130,246,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(34,211,238,0.12) 0%, transparent 50%);
            pointer-events:none; z-index:0;
        }

        .screen { display:none; flex-direction:column; min-height:100dvh; position:relative; z-index:1; }
        .screen.active { display:flex; }

        /* ===== СТАРТ ===== */
        #screen-start { align-items:center; padding:16px 16px 28px; overflow-y:auto; gap:0; }

        .hero { text-align:center; padding:20px 0 16px; }
        .hero-flag {
            font-size:52px;
            filter:drop-shadow(0 0 24px rgba(59,130,246,0.7));
            animation:float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-5px) scale(1.04);} }
        .hero-title {
            font-family:'Unbounded',sans-serif; font-size:19px; font-weight:900;
            background:linear-gradient(120deg,#60a5fa,#22d3ee,#fbbf24);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            margin-top:8px;
        }
        .hero-sub { font-size:11px; color:#475569; margin-top:3px; letter-spacing:0.5px; }

        /* TABS */
        .tabs {
            display:flex; background:var(--surface);
            border:1px solid var(--border); border-radius:13px;
            padding:3px; width:100%; max-width:360px; margin-bottom:14px;
        }
        .tab {
            flex:1; padding:9px 4px; border:none; border-radius:10px;
            background:transparent; color:#475569;
            font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
            cursor:pointer; transition:all 0.2s;
        }
        .tab.active { background:var(--accent); color:white; box-shadow:0 2px 10px rgba(59,130,246,0.4); }

        .tab-panel { display:none; width:100%; max-width:360px; }
        .tab-panel.active { display:block; }

        /* MODES */
        .modes-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:12px; }
        .mode-card {
            background:var(--surface); border:1.5px solid var(--border);
            border-radius:13px; padding:14px 10px; text-align:center;
            cursor:pointer; transition:all 0.18s;
        }
        .mode-card:active { transform:scale(0.95); }
        .mode-card.selected { border-color:var(--accent); background:rgba(59,130,246,0.12); }
        .mode-emoji { font-size:26px; margin-bottom:4px; }
        .mode-name { font-family:'Unbounded',sans-serif; font-size:10px; font-weight:700; }
        .mode-desc { font-size:10px; color:#475569; margin-top:2px; }

        /* INPUTS */
        .input-label {
            font-size:10px; font-weight:700; color:#475569;
            text-transform:uppercase; letter-spacing:0.8px;
            margin-bottom:5px; display:block;
        }
        input, select {
            width:100%; padding:12px 14px;
            background:var(--surface); border:1.5px solid var(--border);
            border-radius:11px; color:#f1f5f9;
            font-family:'Nunito',sans-serif; font-size:14px; font-weight:600;
            outline:none; transition:border-color 0.2s; margin-bottom:9px;
        }
        input:focus, select:focus { border-color:var(--accent); }
        select option { background:#1e293b; }

        /* BTNS */
        .btn {
            width:100%; padding:13px; border:none; border-radius:11px;
            font-family:'Nunito',sans-serif; font-size:14px; font-weight:800;
            cursor:pointer; transition:all 0.18s; margin-bottom:7px;
        }
        .btn:active { transform:scale(0.97); }
        .btn:disabled { opacity:0.4; pointer-events:none; }
        .btn-primary { background:linear-gradient(135deg,#3b82f6,#2563eb); color:white; box-shadow:0 4px 16px rgba(59,130,246,0.35); }
        .btn-secondary { background:var(--surface); border:1.5px solid var(--border); color:#f1f5f9; }
        .btn-success { background:linear-gradient(135deg,#22c55e,#16a34a); color:white; box-shadow:0 4px 16px rgba(34,197,94,0.35); }

        .divider { display:flex; align-items:center; gap:10px; color:#334155; font-size:11px; margin:2px 0 8px; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }

        /* ===== BROWSE ROOMS ===== */
        .rooms-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
        .rooms-title { font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; color:#64748b; }
        .refresh-btn {
            background:var(--surface); border:1px solid var(--border);
            border-radius:7px; padding:5px 10px;
            color:var(--accent); font-size:13px; cursor:pointer;
        }

        .room-item {
            display:flex; align-items:center; gap:11px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:13px; padding:11px 13px; margin-bottom:7px;
            cursor:pointer; transition:all 0.18s;
        }
        .room-item:active { transform:scale(0.98); border-color:var(--accent); }
        .room-icon {
            width:40px; height:40px;
            background:rgba(59,130,246,0.1); border:1.5px solid rgba(59,130,246,0.2);
            border-radius:11px; display:flex; align-items:center; justify-content:center;
            font-size:18px; flex-shrink:0;
        }
        .room-info { flex:1; min-width:0; }
        .room-name { font-weight:800; font-size:13px; }
        .room-meta { font-size:10px; color:#475569; margin-top:1px; }
        .room-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
        .room-avatars { display:flex; }
        .mini-av {
            width:22px; height:22px; border-radius:50%;
            border:2px solid #080f1e; margin-left:-6px;
            display:flex; align-items:center; justify-content:center;
            font-size:9px; font-weight:800; flex-shrink:0; overflow:hidden;
        }
        .mini-av:first-child { margin-left:0; }
        .mini-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
        .join-pill {
            background:rgba(59,130,246,0.15); border:1px solid rgba(59,130,246,0.3);
            border-radius:7px; padding:4px 10px;
            color:var(--accent); font-size:11px; font-weight:700; white-space:nowrap;
        }
        .empty-rooms { text-align:center; padding:28px 0; color:#334155; font-size:13px; }
        .loading-rooms { text-align:center; padding:20px; color:#475569; font-size:12px; }
        .spin { display:inline-block; animation:spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

        /* ===== LOBBY ===== */
        #screen-lobby { padding:0; }
        .lobby-header {
            padding:14px 16px 12px;
            background:linear-gradient(180deg,rgba(59,130,246,0.07) 0%,transparent 100%);
            border-bottom:1px solid var(--border);
        }
        .code-box {
            background:rgba(34,211,238,0.05); border:1px solid rgba(34,211,238,0.18);
            border-radius:13px; padding:11px; text-align:center; margin-bottom:9px;
        }
        .code-label { font-size:10px; color:#475569; text-transform:uppercase; letter-spacing:1px; }
        .code-val {
            font-family:'Unbounded',sans-serif; font-size:24px; font-weight:900;
            color:var(--accent2); letter-spacing:4px;
            text-shadow:0 0 16px rgba(34,211,238,0.4);
        }
        .mode-chip {
            display:inline-flex; align-items:center; gap:4px;
            padding:4px 11px; background:rgba(59,130,246,0.1);
            border:1px solid rgba(59,130,246,0.22); border-radius:18px;
            font-size:11px; font-weight:700; color:var(--accent);
        }
        .lobby-list { flex:1; overflow-y:auto; padding:10px 14px; }
        .lobby-footer { padding:11px 14px; border-top:1px solid var(--border); }

        /* PLAYER CARD */
        .pl-card {
            display:flex; align-items:center; gap:11px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:13px; padding:10px 12px; margin-bottom:7px; transition:0.2s;
        }
        .pl-card.active-turn { border-color:var(--gold); background:rgba(245,158,11,0.05); }

        .av-wrap { position:relative; flex-shrink:0; }
        .av {
            width:40px; height:40px; border-radius:50%;
            border:2.5px solid; object-fit:cover; display:block;
        }
        .av-letter {
            width:40px; height:40px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; font-weight:800; border:2.5px solid;
        }
        .av-badge {
            position:absolute; bottom:-2px; right:-2px;
            width:15px; height:15px; border-radius:50%;
            background:#080f1e; display:flex; align-items:center; justify-content:center;
            font-size:8px;
        }
        .pl-info { flex:1; min-width:0; }
        .pl-name { font-weight:800; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pl-detail { font-size:10px; color:#475569; margin-top:1px; }
        .pl-money { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; color:var(--green); white-space:nowrap; }

        .badge { display:inline-block; padding:2px 6px; border-radius:6px; font-size:9px; font-weight:700; }
        .b-you { background:rgba(34,211,238,0.1); color:var(--accent2); border:1px solid rgba(34,211,238,0.22); }
        .b-bot { background:rgba(168,85,247,0.1); color:#c084fc; border:1px solid rgba(168,85,247,0.22); }
        .b-host { background:rgba(245,158,11,0.1); color:#fbbf24; border:1px solid rgba(245,158,11,0.22); }
        .b-red { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.22); }
        .b-blue { background:rgba(59,130,246,0.1); color:#60a5fa; border:1px solid rgba(59,130,246,0.22); }

        /* ===== GAME ===== */
        #screen-game { padding:0; overflow:hidden; height:100dvh; }

        .game-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:7px 12px;
            background:rgba(8,15,30,0.96); border-bottom:1px solid var(--border);
            backdrop-filter:blur(10px); flex-shrink:0;
        }
        .g-title { font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; color:var(--accent); }
        .g-code { font-size:9px; color:#334155; }
        .close-btn {
            background:var(--surface); border:1px solid var(--border);
            border-radius:7px; padding:5px 10px;
            color:#64748b; font-size:11px; font-weight:700; cursor:pointer;
        }

        /* ===== BOARD ===== */
        .board-wrapper { padding:4px; flex-shrink:0; }

        .board {
            width:100%; aspect-ratio:1;
            display:grid;
            grid-template-columns: 1.7fr repeat(9,1fr) 1.7fr;
            grid-template-rows: 1.7fr repeat(9,1fr) 1.7fr;
            background:#030d06;
            border:2px solid #14532d;
            border-radius:9px; overflow:hidden;
            position:relative;
            /* Займаємо весь доступний простір по ширині */
            max-width:100%;
        }

        .cell {
            border:0.5px solid rgba(20,83,45,0.55);
            display:flex; flex-direction:column;
            justify-content:flex-end; align-items:center;
            font-weight:700; text-align:center;
            padding:0; position:relative;
            background:#060f09; overflow:hidden; color:#86efac;
            min-width:0; min-height:0;
        }

        /* смужки орієнтовані по стороні дошки */
        .c-bottom .cbar { bottom:0; top:auto; height:24%; width:100%; position:absolute; z-index:2; }
        .c-top    .cbar { top:0; bottom:auto; height:24%; width:100%; position:absolute; z-index:2; }
        .c-left   .cbar { left:0; right:auto; width:24%; height:100%; top:0; position:absolute; z-index:2; }
        .c-right  .cbar { right:0; left:auto; width:24%; height:100%; top:0; position:absolute; z-index:2; }

        .cell-in {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            width:100%; height:100%;
            padding:1px 0.5px; z-index:1;
            position:relative;
        }

        /* Текст клітинок — адаптивний через контейнерний підхід */
        .cell-nm {
            line-height:1.1; word-break:break-word; text-align:center;
            font-size:clamp(3px, 1vw, 7px);
            hyphens:auto;
            max-height:75%; overflow:hidden;
        }
        .cell-pr {
            font-size:clamp(2.5px, 0.8vw, 5px);
            color:#4ade80; margin-top:0.5px; line-height:1;
        }

        /* Для клітинок з кольоровою смужкою — відступ від смужки */
        .c-bottom .cell-in { padding-bottom:26%; padding-top:2px; }
        .c-top    .cell-in { padding-top:26%; padding-bottom:2px; }
        /* Бічні — writing-mode вертикальний, тому відступ по горизонталі */
        .c-left   .cell-in { padding-left:26%; }
        .c-right  .cell-in { padding-right:26%; }

        .cell.corner { background:#020a04; justify-content:center; }
        .corner-in {
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:1px;
            width:100%; height:100%; padding:2px;
        }
        .corner-em { font-size:clamp(8px,2.2vw,16px); line-height:1; }
        .corner-lb {
            font-size:clamp(3px,0.75vw,6px); color:#86efac; font-weight:800;
            line-height:1.1; text-align:center; word-break:break-word;
        }

        /* Центр */
        .board-center {
            grid-column:2/11; grid-row:2/11;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#020a04; border:1px solid rgba(20,83,45,0.35); z-index:2;
            gap:2px;
        }
        .bc-flag { font-size:clamp(14px,4.5vw,30px); }
        .bc-title {
            font-family:'Unbounded',sans-serif;
            font-size:clamp(5px,1.8vw,12px); font-weight:900;
            color:#166534; text-align:center; line-height:1.4;
        }

        /* Жетони */
        .tokens {
            position:absolute; bottom:1px; left:0; right:0;
            display:flex; justify-content:center; flex-wrap:wrap; gap:0.5px;
            padding:0 0.5px; z-index:4;
        }
        .token {
            width:clamp(5px,1.5vw,9px); height:clamp(5px,1.5vw,9px);
            border-radius:50%; border:1px solid rgba(255,255,255,0.65);
            box-shadow:0 1px 4px rgba(0,0,0,0.8);
            flex-shrink:0; overflow:hidden;
        }
        .token img { width:100%; height:100%; border-radius:50%; object-fit:cover; }

        /* ===== GAME PANEL ===== */
        .game-panel { flex:1; overflow-y:auto; padding:7px 11px 10px; }

        .dice-row {
            display:flex; align-items:center; gap:8px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:13px; padding:9px 12px; margin-bottom:7px;
            min-height:54px;
        }
        .die {
            width:36px; height:36px; flex-shrink:0;
        }
        .die svg { width:36px; height:36px; }
        .dice-sum { font-family:'Unbounded',sans-serif; font-size:22px; font-weight:900; color:var(--gold); }
        .dice-plus, .dice-eq { color:#334155; font-size:14px; font-weight:700; }

        .roll-btn {
            width:100%; padding:14px; border:none; border-radius:13px;
            font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700;
            cursor:pointer; transition:all 0.18s; margin-bottom:8px;
        }
        .roll-btn:active { transform:scale(0.97); }
        .roll-btn.my-turn {
            background:linear-gradient(135deg,#f59e0b,#d97706); color:white;
            box-shadow:0 4px 18px rgba(245,158,11,0.4);
            animation:pr 1.6s ease-in-out infinite;
        }
        @keyframes pr { 0%,100%{box-shadow:0 4px 18px rgba(245,158,11,0.4);} 50%{box-shadow:0 6px 28px rgba(245,158,11,0.7);} }
        .roll-btn.wait-turn { background:var(--surface); border:1px solid var(--border); color:#334155; pointer-events:none; }

        .sec-lbl { font-family:'Unbounded',sans-serif; font-size:9px; font-weight:700; color:#334155; text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }

        /* Власність */
        .prop-card {
            background:var(--surface); border:1px solid var(--border);
            border-radius:13px; padding:12px; margin-top:4px;
        }
        .prop-top { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
        .prop-dot { width:13px; height:13px; border-radius:4px; flex-shrink:0; }
        .prop-name { font-family:'Unbounded',sans-serif; font-size:11px; font-weight:700; }
        .prop-price { font-family:'Unbounded',sans-serif; font-size:20px; font-weight:900; color:var(--gold); }

        /* ===== WINNER ===== */
        #screen-winner { align-items:center; justify-content:center; padding:28px 20px; text-align:center; }
        .trophy { font-size:68px; animation:tr 1s ease-in-out infinite alternate; }
        @keyframes tr { from{transform:scale(1) rotate(-4deg);} to{transform:scale(1.08) rotate(4deg);} }
        .win-title {
            font-family:'Unbounded',sans-serif; font-size:22px; font-weight:900;
            background:linear-gradient(120deg,#fbbf24,#ef4444,#818cf8);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            margin:12px 0 5px;
        }
        .win-name { font-size:18px; font-weight:800; }
        .win-money { font-family:'Unbounded',sans-serif; font-size:28px; color:var(--green); margin-top:3px; }

        /* TOAST */
        .toast {
            position:fixed; bottom:22px; left:50%;
            transform:translateX(-50%) translateY(80px);
            background:#1a2540; border:1px solid var(--border2);
            border-radius:13px; padding:10px 18px;
            font-size:12px; font-weight:700; z-index:9999;
            transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);
            white-space:nowrap; box-shadow:0 8px 28px rgba(0,0,0,0.4);
            max-width:80vw; text-align:center;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }

        ::-webkit-scrollbar { width:2px; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    </style>
</head>
<body>

<!-- ===== СТАРТ ===== -->
<div id="screen-start" class="screen active">
    <div class="hero">
        <div class="hero-flag">🇺🇦</div>
        <div class="hero-title">МОНОПОЛІЯ</div>
        <div class="hero-sub">УКРАЇНА · MULTIPLAYER</div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('create')">🎮 Створити</button>
        <button class="tab" onclick="switchTab('browse')">🔍 Кімнати</button>
        <button class="tab" onclick="switchTab('join')">🔑 Код</button>
    </div>

    <!-- СТВОРИТИ -->
    <div class="tab-panel active" id="tab-create">
        <div class="modes-grid">
            <div class="mode-card" onclick="selectMode('classic',this)">
                <div class="mode-emoji">🎲</div>
                <div class="mode-name">Класичний</div>
                <div class="mode-desc">2–4 гравці</div>
            </div>
            <div class="mode-card" onclick="selectMode('teams',this)">
                <div class="mode-emoji">👥</div>
                <div class="mode-name">Команди</div>
                <div class="mode-desc">2×2</div>
            </div>
            <div class="mode-card" onclick="selectMode('vsbot',this)">
                <div class="mode-emoji">🤖</div>
                <div class="mode-name">Проти бота</div>
                <div class="mode-desc">1 vs боти</div>
            </div>
            <div class="mode-card" onclick="selectMode('mixed',this)">
                <div class="mode-emoji">🎯</div>
                <div class="mode-name">Змішаний</div>
                <div class="mode-desc">Гравці + боти</div>
            </div>
        </div>
        <label class="input-label">Ваше ім'я</label>
        <input type="text" id="pName" placeholder="Введіть ім'я" maxlength="20">
        <div id="botCntWrap" style="display:none;">
            <label class="input-label">Кількість ботів</label>
            <select id="botCnt">
                <option value="1">1 бот</option>
                <option value="2">2 боти</option>
                <option value="3">3 боти</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="createRoom()">🎮 Створити кімнату</button>
    </div>

    <!-- КІМНАТИ -->
    <div class="tab-panel" id="tab-browse">
        <div class="rooms-header">
            <span class="rooms-title">Відкриті кімнати</span>
            <button class="refresh-btn" onclick="loadRooms()">↺</button>
        </div>
        <label class="input-label">Ваше ім'я</label>
        <input type="text" id="pNameB" placeholder="Введіть ім'я" maxlength="20">

        4:[[25,25],[75,25],[25,75],[75,75]],

// ===== АВАТАР =====
function avHtml(p,sz=40){

function miniAv(p){

        return `<div class="mini-av" style="border-color:${c};background:${c}22;">
            <img src="${p.photoUrl}" onerror="this.parentElement.textContent='${ini}'" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">
        </div>`;

    return `<div class="mini-av" style="background:${c}22;border-color:${c};color:${c};">${ini}</div>`;

        id:myId, name:myName, pos:0, money:15000, props:[],

// ===== ROOMS LIST =====
async function loadRooms(){
    if(!db){ setTimeout(loadRooms,800); return; }
    const el=document.getElementById('roomsList');
    el.innerHTML='<div class="loading-rooms"><span class="spin">⏳</span> Завантаження...</div>';

    const snap=await db.ref('rooms').orderByChild('status').equalTo('waiting').once('value');
    const data=snap.val();
    const list=data ? Object.values(data).filter(r=>{
        const pl=Object.values(r.players||{});
        return pl.length<4 && pl.length>0 && pl.some(p=>!p.isBot);
    }) : [];

    if(!list.length){
        el.innerHTML='<div class="empty-rooms">😕 Немає відкритих кімнат<br><small style="color:#334155">Створіть нову!</small></div>';
        return;
    }

    el.innerHTML=list.slice(0,8).map(r=>{
        const pl=Object.values(r.players||{});
        const avs=pl.map(p=>miniAv(p)).join('');
        return `<div class="room-item" onclick="quickJoin('${r.code}')">
            <div class="room-icon">${MICONS[r.mode]||'🎲'}</div>
            <div class="room-info">
                <div class="room-name">${r.code}</div>
                <div class="room-meta">${MNAMES[r.mode]||'Класичний'} · ${pl.length}/4</div>
            </div>
            <div class="room-right">
                <div class="room-avatars">${avs}</div>
                <div class="join-pill">Зайти →</div>
            </div>
        </div>`;
    }).join('');
}

async function quickJoin(code){
    myName=document.getElementById('pNameB').value.trim()||TGU?.first_name||'Гравець';
    await joinToRoom(code);
}

// ===== CREATE =====
async function createRoom(){
    if(!selMode){ toast('⚠️ Оберіть режим!'); return; }
    myName=document.getElementById('pName').value.trim()||TGU?.first_name||'Гравець';
    myRoom='GAME-'+Math.random().toString(36).substr(2,4).toUpperCase();

    const players={};
    players[myId]=myPlayerData(0);
    if(selMode==='teams') players[myId].team='red';

    if(selMode==='vsbot'||selMode==='mixed'){
        const cnt=parseInt(document.getElementById('botCnt').value);
        for(let i=0;i<cnt;i++){
            players['bot_'+i]={
                id:'bot_'+i, name:'Бот '+(i+1), pos:0, money:15000,
                props:[], online:true, color:COLORS[i+1], colorName:CNAMES[i+1],
                isBot:true, photoUrl:null
            };
        }
    }

    const room={
        code:myRoom, mode:selMode, status:'waiting',
        players, game:{current:0,dice1:0,dice2:0,lastRoll:0},
        createdAt:Date.now()
    };
    if(selMode==='teams') room.teams={red:[myId],blue:[]};

    await db.ref('rooms/'+myRoom).set(room);
    openLobby(selMode); haptic('medium');
}

async function joinByCode(){
    myName=document.getElementById('pNameJ').value.trim()||TGU?.first_name||'Гравець';
    const code=document.getElementById('roomCode').value.trim().toUpperCase();
    if(!code){ toast('⚠️ Введіть код'); return; }
    await joinToRoom(code);
}

async function joinToRoom(code){
    if(!db){ toast('❌ Немає підключення'); return; }
    const snap=await db.ref('rooms/'+code).once('value');
    if(!snap.val()){ toast('❌ Кімнату не знайдено'); return; }
    const room=snap.val();
    const pl=Object.values(room.players||{});
    if(pl.length>=4){ toast('❌ Кімната повна'); return; }
    if(room.status!=='waiting'){ toast('❌ Гра вже почалась'); return; }

    myRoom=code; selMode=room.mode;
    const np=myPlayerData(pl.length);
    if(room.mode==='teams'){
        const rc=Object.values(room.players).filter(p=>p.team==='red').length;
        np.team=rc<2?'red':'blue';
    }
    await db.ref('rooms/'+myRoom+'/players/'+myId).set(np);
    openLobby(room.mode); haptic('medium');
}

function openLobby(mode){
    document.getElementById('lobbyCode').textContent=myRoom;
    document.getElementById('modeChip').textContent=(MICONS[mode]||'🎲')+' '+(MNAMES[mode]||mode);
    showScreen('screen-lobby'); listenRoom();
}

async function startGame(){
    await db.ref('rooms/'+myRoom).update({status:'playing'}); haptic('heavy');
}

async function leaveRoom(){
    if(roomOff){ db.ref('rooms/'+myRoom).off('value',roomOff); roomOff=null; }
    if(myRoom) await db.ref('rooms/'+myRoom+'/players/'+myId).remove();
    myRoom=null; selMode=null; gameShown=false; boardBuilt=false;
    document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));
    showScreen('screen-start'); loadRooms();
}

// ===== LISTEN =====
function listenRoom(){
    if(roomOff) db.ref('rooms/'+myRoom).off('value',roomOff);
    roomOff=db.ref('rooms/'+myRoom).on('value',snap=>{
        const r=snap.val(); if(!r) return;
        if(r.status==='waiting') renderLobby(r);
        else if(r.status==='playing') renderGame(r);
        else if(r.status==='finished') renderWinner(r);
    });
}

// ===== LOBBY =====
function renderLobby(room){
    const pl=Object.values(room.players||{});
    const hostId=Object.keys(room.players||{})[0];
    const minP=room.mode==='teams'?4:(room.mode==='vsbot'?1:2);

    document.getElementById('lobbyList').innerHTML=pl.map((p,i)=>{
        let b='';
        if(p.id===myId) b+='<span class="badge b-you">Ви</span> ';
        if(p.id===hostId&&!p.isBot) b+='<span class="badge b-host">👑</span> ';
        if(p.isBot) b+='<span class="badge b-bot">🤖</span>';
        if(p.team==='red') b+=' <span class="badge b-red">Червона</span>';
        if(p.team==='blue') b+=' <span class="badge b-blue">Синя</span>';
        return `<div class="pl-card">
            <div class="av-wrap">
                ${avHtml(p,40)}
                <div class="av-badge">${p.isBot?'🤖':'👤'}</div>
            </div>
            <div class="pl-info">
                <div class="pl-name">${p.name}</div>
                <div class="pl-detail">${p.colorName} ${b}</div>
            </div>
            <div class="pl-money">${p.money.toLocaleString()}₴</div>
        </div>`;
    }).join('');

    const btn=document.getElementById('startBtn');
    const isHost=hostId===myId;
    btn.disabled=pl.length<minP||!isHost;
    btn.textContent=!isHost?'⏳ Чекаємо хоста...'
        :pl.length<minP?`⏳ Ще ${minP-pl.length} гравців`
        :`▶️ Почати (${pl.length} гравців)`;
}

// ===== BOARD =====
function buildBoard(){
    if(boardBuilt) return; boardBuilt=true;
    const board=document.getElementById('board');
    board.innerHTML='';

    // Центр
    const c=document.createElement('div');
    c.className='board-center';
    c.style.gridColumn='2/11'; c.style.gridRow='2/11';
    c.innerHTML=`<div class="bc-flag">🇺🇦</div><div class="bc-title">МОНОПОЛІЯ<br>УКРАЇНА</div>`;
    board.appendChild(c);

    // Позиції: низ→права→верх→ліва
    // side визначає де малювати кольорову смужку
    const posMap=[];
    for(let i=0;i<=10;i++) posMap.push({row:10,col:i,side:'bottom'});
    for(let i=9;i>=1;i--) posMap.push({row:i,col:10,side:'right'});
    for(let i=10;i>=0;i--) posMap.push({row:0,col:i,side:'top'});
    for(let i=1;i<=9;i++) posMap.push({row:i,col:0,side:'left'});

    posMap.forEach(({row,col,side},idx)=>{
        if(idx>=40) return;
        const cell=document.createElement('div');
        cell.className='cell'; cell.id='cell-'+idx;
        cell.style.gridRow=row+1; cell.style.gridColumn=col+1;

        const p=PROPS[idx];

        if(p.type==='corner'){
            cell.classList.add('corner');
            cell.innerHTML=`<div class="corner-in">
                <div class="corner-em">${p.emoji}</div>
                <div class="corner-lb">${p.name}</div>
            </div>`;
        } else if(p.color){
            cell.classList.add('c-'+side);
            // Для бічних клітинок текст треба повертати
            let innerStyle='';
            if(side==='left'||side==='right'){
                innerStyle='writing-mode:vertical-rl;text-orientation:mixed;';
                if(side==='left') innerStyle+='transform:rotate(180deg);';
            }
            cell.innerHTML=`<div class="cbar" style="background:${p.color};"></div>
                <div class="cell-in" style="${innerStyle}">
                    <div class="cell-nm">${p.name}</div>
                    <div class="cell-pr">${p.price}₴</div>
                </div>`;
        } else {
            // Шанс, податок, вокзал, комунальні
            let innerStyle='';
            if(side==='left'||side==='right'){
                innerStyle='writing-mode:vertical-rl;text-orientation:mixed;';
                if(side==='left') innerStyle+='transform:rotate(180deg);';
            }
            cell.innerHTML=`<div class="cell-in" style="${innerStyle}">
                <div style="font-size:clamp(6px,1.8vw,11px);line-height:1;">${p.emoji||'?'}</div>
                <div class="cell-nm">${p.name}</div>
            </div>`;
        }

        const tok=document.createElement('div');
        tok.className='tokens'; tok.id='tok-'+idx;
        cell.appendChild(tok);
        board.appendChild(cell);
    });
}

// ===== GAME =====
function renderGame(room){
    if(!gameShown){
        document.getElementById('gameCode').textContent=myRoom;
        buildBoard(); showScreen('screen-game'); gameShown=true;
    }

    const pl=Object.values(room.players||{});

    // Жетони
    document.querySelectorAll('.tokens').forEach(el=>el.innerHTML='');
    pl.forEach(p=>{
        const c=document.getElementById('tok-'+p.pos); if(!c) return;
        const t=document.createElement('div');
        t.className='token'; t.style.background=p.color;
        if(p.photoUrl){
            t.innerHTML=`<img src="${p.photoUrl}" onerror="this.parentElement.style.background='${p.color}'" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        }
        c.appendChild(t);
    });

    // Гравці
    document.getElementById('gamePlayers').innerHTML=pl.map((p,i)=>{
        const isAct=i===room.game.current;
        let b='';
        if(p.id===myId) b+='<span class="badge b-you">Ви</span> ';
        if(p.isBot) b+='<span class="badge b-bot">🤖</span>';
        return `<div class="pl-card ${isAct?'active-turn':''}">
            <div class="av-wrap">
                ${avHtml(p,38)}
                ${isAct?'<div class="av-badge" style="background:#f59e0b;font-size:7px;">▶</div>':''}
            </div>
            <div class="pl-info">
                <div class="pl-name">${p.name} ${b}</div>
                <div class="pl-detail">${PROPS[p.pos]?.name||'?'} · ${(p.props||[]).length} 🏠</div>
            </div>
            <div class="pl-money">${p.money.toLocaleString()}₴</div>
        </div>`;
    }).join('');

    // Кубики
    if(room.game.dice1&&room.game.dice2){
        document.getElementById('diceRow').innerHTML=`
            <div class="die">${dieSVG(room.game.dice1)}</div>
            <span class="dice-plus">+</span>
            <div class="die">${dieSVG(room.game.dice2)}</div>
            <span class="dice-eq">=</span>
            <span class="dice-sum">${room.game.dice1+room.game.dice2}</span>`;
    }

    // Кнопка
    const cur=pl[room.game.current];
    const isMy=cur?.id===myId;
    const btn=document.getElementById('rollBtn');
    btn.disabled=!isMy;
    btn.className='roll-btn '+(isMy?'my-turn':'wait-turn');
    btn.textContent=isMy?'🎲 Ваш хід — кидати!':'⏳ Хід: '+cur?.name;

    // Власність
    renderPropInfo(room,pl,cur,isMy);

    // Бот
    if(cur?.isBot&&room.status==='playing'){
        clearTimeout(botTmr);
        botTmr=setTimeout(()=>doBotMove(room),1700);
    }

    checkWinner(room);
}

function renderPropInfo(room,pl,cur,isMy){
    if(!isMy||!cur){ document.getElementById('propInfo').innerHTML=''; return; }
    const pos=cur.pos, p=PROPS[pos];
    let html='';

    if(p?.price){
        const own=pl.find(x=>(x.props||[]).includes(pos));
        if(!own){
            html=`<div class="prop-card">
                <div class="prop-top">
                    ${p.color?`<div class="prop-dot" style="background:${p.color}"></div>`:'<span>🏢</span>'}
                    <div class="prop-name">${p.name}</div>
                </div>
                <div class="prop-price">${p.price.toLocaleString()}₴</div>
                <button class="btn btn-success" onclick="buyProp(${pos},${p.price})" style="margin-top:7px;margin-bottom:0;">💰 Купити</button>
            </div>`;
        } else if(own.id!==myId){
            const rent=Math.floor(p.price*0.1);
            html=`<div class="prop-card" style="border-color:${own.color}33;">
                <div class="prop-top">
                    ${p.color?`<div class="prop-dot" style="background:${p.color}"></div>`:''}
                    <div class="prop-name">${p.name}</div>
                </div>
                <div style="color:#475569;font-size:11px;">Власник: <strong style="color:${own.color}">${own.name}</strong></div>
                <div style="color:var(--red);font-weight:800;font-size:17px;margin-top:4px;">-${rent.toLocaleString()}₴</div>
            </div>`;
        }
    } else if(p?.type==='tax'){
        html=`<div class="prop-card" style="text-align:center;">
            <div style="font-size:26px;">💸</div>
            <div class="prop-name" style="margin:5px 0;">${p.name}</div>
            <div style="color:var(--red);font-weight:800;font-size:18px;">-${p.amount?.toLocaleString()}₴</div>
        </div>`;
    } else if(p?.type==='chance'){
        html=`<div class="prop-card" style="text-align:center;">
            <div style="font-size:30px;">❓</div>
            <div class="prop-name" style="margin-top:5px;">Картка Шансу</div>
        </div>`;
    }

    document.getElementById('propInfo').innerHTML=html;
}

// ===== ACTIONS =====
async function rollDice(){
    if(!db||!myRoom) return;
    const snap=await db.ref('rooms/'+myRoom).once('value');
    const room=snap.val(); if(!room) return;
    const pl=Object.values(room.players);
    const cur=pl[room.game.current];
    if(cur?.id!==myId){ toast('⚠️ Не ваш хід!'); return; }

    haptic('medium');
    const d1=Math.ceil(Math.random()*6), d2=Math.ceil(Math.random()*6);
    const newPos=(cur.pos+d1+d2)%40;
    let money=cur.money;

    if(newPos<cur.pos){ money+=2000; toast('🏁 +2000₴ за Старт!'); haptic('heavy'); }

    const p=PROPS[newPos];
    if(p?.price){
        const own=pl.find(x=>(x.props||[]).includes(newPos)&&x.id!==myId);
        if(own){ const rent=Math.floor(p.price*0.1); money=Math.max(0,money-rent);
            await db.ref('rooms/'+myRoom+'/players/'+own.id).update({money:own.money+rent});
            toast('💸 Оренда '+own.name+': -'+rent+'₴'); }
    }
    if(p?.type==='tax'){ money=Math.max(0,money-(p.amount||1000)); toast('💸 Податок: -'+p.amount+'₴'); haptic('heavy'); }

    await db.ref('rooms/'+myRoom+'/players/'+myId).update({pos:newPos,money});
    await db.ref('rooms/'+myRoom+'/game').update({
        dice1:d1, dice2:d2,
        current:(room.game.current+1)%pl.length,
        lastRoll:Date.now()
    });
}

async function buyProp(pos,price){
    const snap=await db.ref('rooms/'+myRoom).once('value');
    const me=Object.values(snap.val()?.players||{}).find(p=>p.id===myId);
    if(!me) return;
    if(me.money<price){ toast('❌ Недостатньо грошей!'); haptic('heavy'); return; }
    await db.ref('rooms/'+myRoom+'/players/'+myId).update({
        props:[...(me.props||[]),pos], money:me.money-price
    });
    haptic('medium'); toast('🏠 '+PROPS[pos].name+' куплено!');
}

// ===== BOT =====
async function doBotMove(room){
    const pl=Object.values(room.players);
    const bot=pl[room.game.current]; if(!bot?.isBot) return;

    const d1=Math.ceil(Math.random()*6), d2=Math.ceil(Math.random()*6);
    const newPos=(bot.pos+d1+d2)%40;
    let money=bot.money;
    if(newPos<bot.pos) money+=2000;

    const p=PROPS[newPos];
    if(p?.price){ const own=pl.find(x=>(x.props||[]).includes(newPos)&&x.id!==bot.id);
        if(own){ const r=Math.floor(p.price*0.1); money=Math.max(0,money-r);
            await db.ref('rooms/'+myRoom+'/players/'+own.id).update({money:own.money+r}); } }
    if(p?.type==='tax') money=Math.max(0,money-(p.amount||1000));

    await db.ref('rooms/'+myRoom+'/players/'+bot.id).update({pos:newPos,money});
    await db.ref('rooms/'+myRoom+'/game').update({
        dice1:d1, dice2:d2,
        current:(room.game.current+1)%pl.length, lastRoll:Date.now()
    });

    setTimeout(async()=>{
        const s2=await db.ref('rooms/'+myRoom).once('value');
        const r2=s2.val(); if(!r2) return;
        const pl2=Object.values(r2.players||{});
        const b2=pl2.find(x=>x.id===bot.id);
        if(!b2) return;
        const p2=PROPS[newPos];
        if(p2?.price&&b2.money>=p2.price){
            const alr=pl2.find(x=>(x.props||[]).includes(newPos));
            if(!alr&&p2.price<b2.money*0.6){
                await db.ref('rooms/'+myRoom+'/players/'+bot.id).update({
                    props:[...(b2.props||[]),newPos], money:b2.money-p2.price
                });
            }
        }
    },700);
}

// ===== WINNER =====
function checkWinner(room){
    const pl=Object.values(room.players||{});
    if(pl.filter(p=>p.money>0).length<=1&&pl.length>=2){
        const w=pl.reduce((a,b)=>a.money>b.money?a:b);
        db.ref('rooms/'+myRoom).update({status:'finished',winner:w.id});
    }
}

function renderWinner(room){
    const pl=Object.values(room.players||{});
    const w=pl.find(p=>p.id===room.winner)||pl[0]; if(!w) return;
    document.getElementById('winName').innerHTML=`
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;">
            ${avHtml(w,52)}
            <span>${w.name}${w.id===myId?' (Ви!)':''}</span>
        </div>`;
    document.getElementById('winMoney').textContent=w.money.toLocaleString()+'₴';
    showScreen('screen-winner');
    if(w.id===myId){ haptic('heavy'); tg?.HapticFeedback?.notificationOccurred('success'); }
}
